name: Validate Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify module import
        run: python -c "import main"

      - name: Run dry-run smoke test
        env:
          HOUSE_NUMBER: 626
          STREET_NAME: Bellefonte St
          ZIP_CODE: 15232
          CALENDAR_ID: primary
          DRY_RUN: true
          WEEKS_AHEAD: 2
        run: python main.py
