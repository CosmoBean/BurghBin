name: Validate Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify module import
        run: python -c "import main"

      - name: Run unit tests
        run: pytest

      - name: Run dry-run smoke test
        env:
          HOUSE_NUMBER: 320
          STREET_NAME: S Craig St
          ZIP_CODE: 15213
          CALENDAR_ID: primary
          TARGET_MONTH: 2026-03
          ATTENDEE_EMAILS: roommate1@example.com,roommate2@example.com
          DRY_RUN: true
        run: python main.py
